name: Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install root
        run: npm ci
      - name: Install example app
        run: npm ci
        working-directory: examples/todo-app
      - name: Build & run all gates
        run: npm run verify
